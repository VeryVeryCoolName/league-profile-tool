name: Windows Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
      - 'V*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    name: Build Windows artifacts
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build production app
        run: npm run build:prod

      - name: Package Electron app
        run: npm run electron:package

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: league-profile-tool-windows
          if-no-files-found: error
          retention-days: 30
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest.yml
