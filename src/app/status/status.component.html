<main>
<mat-form-field appearance="fill">
  <mat-label>Status</mat-label>
  <mat-select [(value)]="availability">
    <mat-option *ngFor="let status of statuses" [value]="status.value">
      {{status.label}}
    </mat-option>
  </mat-select>
</mat-form-field>
<mat-form-field appearance="fill">
  <mat-label>Putting too many characters will bug out your chat/friends list</mat-label>
  <textarea matInput [(ngModel)]="text"></textarea>
</mat-form-field>
  <button mat-raised-button color="primary" (click)="setStatus()">Set Status</button>
</main>
