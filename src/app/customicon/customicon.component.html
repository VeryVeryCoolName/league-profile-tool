<main class="custom-icons-page">
  <mat-card class="note-card">
    <mat-card-header>
      <mat-card-title>Note</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>These icons will ONLY be seen by your friends, you will not be able to see them unless you hover over your name. These are not permanent and will reset.</p>
    </mat-card-content>
  </mat-card>

  <form class="tool-panel search-panel" (submit)="$event.preventDefault()">
    <mat-form-field>
      <mat-label>Search by name or ID</mat-label>
      <input matInput [(ngModel)]="searchKeyword" (ngModelChange)="resetIconLimit()" name="search" placeholder="Ex. Ahri or 0">
    </mat-form-field>
  </form>

  <p *ngIf="iconsLoading" class="loading-text">Loading icons...</p>
  <p *ngIf="iconsError" class="loading-text">{{iconsError}}</p>
  <div class="icon-grid" *ngIf="!iconsLoading && !iconsError">
    <span class="icons" *ngFor="let icon of visibleIcons; trackBy: trackByIcon">
        <button *ngIf="!icon.broken" mat-stroked-button (click)="setIcon(icon.id)">
          <img [src]="icon.src" [alt]="icon.title || icon.id" loading="lazy" decoding="async" (error)="onIconError(icon)"/>
        </button>
    </span>
  </div>
  <button *ngIf="visibleIcons.length < filteredIcons.length" mat-raised-button color="primary" (click)="loadMoreIcons()">Load More</button>
</main>
