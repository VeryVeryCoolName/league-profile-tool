@if (data.title) {
  <h1 mat-dialog-title>{{data.title}}</h1>
  <div mat-dialog-content>
    <p>{{data.body}}</p>
  </div>
} @else {
  @if (data.body === 'Success') {
    <h1 mat-dialog-title>Success</h1>
    <div mat-dialog-content>
      <p>Request made successfully.</p>
    </div>
  } @else {
    <h1 mat-dialog-title>Error</h1>
    <div mat-dialog-content>
      <p>{{data.body}}</p>
    </div>
  }
}
<div mat-dialog-actions align="end">
  @if (isConfirmation) {
    <button mat-button type="button" [mat-dialog-close]="false">{{data.cancelLabel || 'Cancel'}}</button>
    <button mat-raised-button color="primary" type="button" [mat-dialog-close]="true">{{data.confirmLabel}}</button>
  } @else {
    <button mat-raised-button color="primary" type="button" mat-dialog-close>Close</button>
  }
</div>
