<section class="dialog-shell" tabindex="-1" [class.success]="dialogKind === 'success'" [class.error]="dialogKind === 'error'" [class.confirm]="dialogKind === 'confirm'" [class.info]="dialogKind === 'info'">
  <div class="dialog-copy">
    <h1>{{displayTitle}}</h1>
    <p>{{displayBody}}</p>
  </div>

  <div class="dialog-actions">
    @if (isConfirmation) {
      <button mat-button class="secondary-action" type="button" [mat-dialog-close]="false">{{secondaryLabel}}</button>
      <button mat-raised-button color="primary" class="primary-action" [class.destructive]="isDestructiveConfirmation" type="button" [mat-dialog-close]="true">{{primaryLabel}}</button>
    } @else {
      <button mat-raised-button color="primary" class="primary-action" type="button" mat-dialog-close>{{primaryLabel}}</button>
    }
  </div>
</section>
