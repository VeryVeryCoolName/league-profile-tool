<section class="dialog-shell" tabindex="-1" [class.success]="dialogKind === 'success'" [class.error]="dialogKind === 'error'" [class.confirm]="dialogKind === 'confirm'">
  <h1>{{displayTitle}}</h1>

  <div class="dialog-content">
    <p>{{displayBody}}</p>
  </div>

  <div class="dialog-actions">
    @if (isConfirmation) {
      <button mat-button type="button" [mat-dialog-close]="false">{{data.cancelLabel || 'Cancel'}}</button>
      <button mat-raised-button color="primary" type="button" [mat-dialog-close]="true">{{data.confirmLabel}}</button>
    } @else {
      <button mat-raised-button color="primary" type="button" mat-dialog-close>Close</button>
    }
  </div>
</section>
