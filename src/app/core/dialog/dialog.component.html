<ng-container *ngIf="data.title; then Custom; else Default"></ng-container>
<ng-template #Custom>
  <h1>{{data.title}}</h1>
  <p>{{data.body}}</p>
</ng-template>
<ng-template #Default>
  <ng-container *ngIf="data.body === 'Success'; then Success; else Failure"></ng-container>
</ng-template>
<ng-template #Success>
  <h1>Success</h1>
  <p>Request made successfully</p>
</ng-template>
<ng-template #Failure>
  <h1>Error</h1>
  <p>{{data.body}}</p>
</ng-template>
<div mat-dialog-actions>
  <button mat-button mat-dialog-close>Close</button>
</div>
