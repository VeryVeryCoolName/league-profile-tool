<main>
  <mat-card>
    <mat-card-title>LCU Explorer</mat-card-title>
    <mat-card-content>
      <p>Safely inspect selected read-only LCU endpoints. Choose an endpoint, then refresh to fetch the current response.</p>
    </mat-card-content>
  </mat-card>

  <mat-form-field appearance="fill">
    <mat-label>Search endpoints</mat-label>
    <input matInput [(ngModel)]="query">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Endpoint</mat-label>
    <mat-select [(value)]="selectedEndpoint">
      <mat-option *ngFor="let endpoint of filteredEndpoints" [value]="endpoint.path">
        {{endpoint.method}} {{endpoint.path}}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <div class="endpoint-actions">
    <button mat-raised-button color="primary" (click)="refresh()">Refresh</button>
    <p *ngIf="loading">Loading...</p>
  </div>

  <pre *ngIf="response">{{response}}</pre>
</main>
